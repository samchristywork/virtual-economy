<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Economy Simulation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">
  <div id="title-row">
    <h1>Virtual Economy Simulation</h1>
    <button id="themeBtn">Dark Mode</button>
  </div>
  <div id="controls">
    <label>Iterations: <input id="iterations" type="number" value="30" min="1" max="500"></label>
    <label>Speed: <input id="speed" type="range" min="0" max="100" value="90"></label>
    <button id="runBtn">Run Simulation</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="exportBtn">Export JSON</button>
  </div>
</div>

<div class="card" id="agents-section">
  <h2 id="agentsToggle">Agents <span id="agentsChevron">▶</span></h2>
  <div id="agents-body" hidden>
    <div id="agents-panel"></div>
    <div id="add-agent-row">
      <input id="newAgentName" type="text" placeholder="Agent name" maxlength="20">
      <select id="newAgentStrategy"></select>
      <button id="addAgentBtn">+ Add Agent</button>
    </div>
  </div>
</div>

<div class="card" id="progress-card">
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="progress-text">Ready</div>
</div>

<div id="charts-row">
  <div class="chart-card">
    <h2>Asset Prices</h2>
    <canvas id="priceChart"></canvas>
    <div class="legend" id="priceLegend"></div>
  </div>
  <div class="chart-card">
    <h2>Net Worth</h2>
    <canvas id="nwChart"></canvas>
    <div class="legend" id="nwLegend"></div>
  </div>
</div>

<div class="chart-card" id="volume-section">
  <h2>Trade Volume</h2>
  <canvas id="volumeChart"></canvas>
  <div class="legend" id="volumeLegend"></div>
</div>

<div class="card" id="leaderboard-section">
  <h2>Leaderboard</h2>
  <div id="leaderboard-wrap">
    <table id="leaderboard">
      <thead>
        <tr>
          <th>#</th><th>Agent</th><th>Strategy</th>
          <th>Balance</th><th>FOOD</th><th>OIL</th><th>WATER</th><th>Net Worth</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </div>
</div>

<div class="card" id="log-section">
  <h2>Activity Log</h2>
  <pre id="log">Run the simulation to see activity.</pre>
</div>

<div id="chart-tooltip" hidden></div>
<script src="script.js"></script>
</body>
</html>
